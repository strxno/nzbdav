name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        continue-on-error: true
        id: login-dockerhub
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          GHCR_REPO="ghcr.io/${{ github.repository }}"
          DOCKERHUB_REPO="${{ github.repository_owner }}/nzbdav"
          echo "NZBDAV_VERSION=$(date +%Y-%m-%d)+fork" >> $GITHUB_OUTPUT
          {
            echo "TAGS<<EOF"
            echo "${GHCR_REPO}:latest"
            if [ "${{ steps.login-dockerhub.outcome }}" = "success" ]; then
              echo "docker.io/${DOCKERHUB_REPO}:latest"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}
